<script>
  document.getElementById('loginBtn').addEventListener('click', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    document.getElementById('loginBtn').innerText = "Memproses...";

    // Menggunakan objek 'supabase' yang bersumber dari file supabase.js
    const { data, error } = await supabase.auth.signInWithPassword({
      email: email,
      password: password,
    });

    if (error) {
      alert("Gagal masuk: " + error.message);
      document.getElementById('loginBtn').innerText = "Masuk";
    } else {
      // Jika sukses, pindah ke halaman dashboard
      window.location.href = 'dashboard.html';
    }
  });
</script>
